<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Logo Salve Mais</title>
  <desc id="desc">Logo para aplicativo de gestão financeira com símbolo de escudo, check e sinal de mais.</desc>

  <defs>
    <linearGradient id="brandGradient" x1="130" y1="55" x2="330" y2="345" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#19C37D"/>
      <stop offset="1" stop-color="#0A7C66"/>
    </linearGradient>
    <filter id="softShadow" x="50" y="35" width="330" height="350" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#063B32" flood-opacity="0.20"/>
    </filter>
  </defs>

  <!-- Icon -->
  <g filter="url(#softShadow)">
    <path d="M215 54L335 104V194C335 271 286 333 215 363C144 333 95 271 95 194V104L215 54Z" fill="url(#brandGradient)"/>
    <path d="M215 77L313 118V194C313 258 273 309 215 337C157 309 117 258 117 194V118L215 77Z" stroke="white" stroke-opacity="0.35" stroke-width="10"/>
  </g>

  <!-- Check mark -->
  <path d="M158 206L197 245L280 157" stroke="white" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Plus sign -->
  <circle cx="292" cy="280" r="54" fill="#F8B400"/>
  <path d="M292 252V308M264 280H320" stroke="white" stroke-width="18" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="420" y="194" font-family="Inter, Montserrat, Arial, sans-serif" font-size="92" font-weight="800" letter-spacing="-3" fill="#063B32">Salve</text>
  <text x="420" y="294" font-family="Inter, Montserrat, Arial, sans-serif" font-size="92" font-weight="800" letter-spacing="-3" fill="#19A974">Mais</text>

  <!-- Tagline -->
  <text x="425" y="340" font-family="Inter, Montserrat, Arial, sans-serif" font-size="28" font-weight="500" letter-spacing="0.5" fill="#52736B">gestão financeira simples</text>
</svg>
