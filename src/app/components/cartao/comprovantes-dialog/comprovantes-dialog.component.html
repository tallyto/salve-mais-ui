<div>
  <div class="flex align-items-center gap-2 mb-4">
    <i class="pi pi-receipt"></i>
    <span>Comprovantes - {{ data.contaFixaNome }}</span>
  </div>

  <!-- Upload Section -->
  <p-accordion class="mb-4">
    <p-accordionTab header="Adicionar Comprovante" [selected]="true">
      <ng-template pTemplate="header">
        <div class="flex align-items-center gap-2">
          <i class="pi pi-cloud-upload"></i>
          <span>Adicionar Comprovante</span>
        </div>
      </ng-template>

      <div class="p-4">
        <div class="flex flex-column gap-3 align-items-start">
          <input type="file" id="fileInput" (change)="selectFile($event)" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx">
          <p-button label="Enviar"
                   icon="pi pi-cloud-upload"
                   [disabled]="isUploading || !selectedFiles"
                   (click)="upload()">
          </p-button>
        </div>
        <p-progressbar *ngIf="isUploading" [value]="100" mode="indeterminate" class="mt-3"></p-progressbar>
      </div>
    </p-accordionTab>
  </p-accordion>

  <!-- List Section -->
  <div class="mt-4">
    <h3 class="flex align-items-center gap-2 mb-3">
      <i class="pi pi-list"></i>
      Comprovantes Disponíveis
    </h3>

    <div class="flex flex-column align-items-center justify-content-center gap-2 p-4" *ngIf="anexos.length === 0">
      <i class="pi pi-info-circle text-4xl text-gray-400"></i>
      <p class="m-0 text-gray-600">Nenhum comprovante encontrado para esta conta.</p>
    </div>

    <div *ngIf="anexos.length > 0" class="flex flex-column">
      <div *ngFor="let anexo of anexos" class="flex align-items-center gap-3 p-3 border-bottom-1 surface-border">
        <i [class]="'pi ' + getFileIcon(anexo.tipo) + ' text-lg'"></i>
        <div class="flex-1">
          <div class="font-bold">{{ anexo.nome }}</div>
          <div class="text-sm text-gray-600">Enviado em: {{ formatarData(anexo.dataUpload) }}</div>
        </div>
        <div class="flex gap-2">
          <p-button [rounded]="true" [text]="true" icon="pi pi-download" (click)="downloadAnexo(anexo)"
                   pTooltip="Baixar comprovante">
          </p-button>
          <p-button [rounded]="true" [text]="true" icon="pi pi-trash" severity="danger" (click)="removerAnexo(anexo)"
                   pTooltip="Remover comprovante">
          </p-button>
        </div>
      </div>
    </div>
  </div>
</div>

<ng-template pTemplate="footer">
  <p-button label="Fechar" (click)="fechar()"></p-button>
</ng-template>
