<form [formGroup]="usuarioForm" class="flex flex-column gap-4">
  <p-floatlabel class="w-full">
    <input pInputText id="nome" formControlName="nome" class="w-full" required>
    <label for="nome">Nome Completo</label>
  </p-floatlabel>
  <small class="p-error" *ngIf="usuarioForm.get('nome')?.hasError('required') && usuarioForm.get('nome')?.touched">
    Nome é obrigatório
  </small>
  <small class="p-error" *ngIf="usuarioForm.get('nome')?.hasError('minlength') && usuarioForm.get('nome')?.touched">
    Nome deve ter pelo menos 3 caracteres
  </small>

  <p-floatlabel class="w-full">
    <input pInputText id="email" formControlName="email" class="w-full" required type="email">
    <label for="email">Email</label>
  </p-floatlabel>
  <small class="p-error" *ngIf="usuarioForm.get('email')?.hasError('required') && usuarioForm.get('email')?.touched">
    Email é obrigatório
  </small>
  <small class="p-error" *ngIf="usuarioForm.get('email')?.hasError('email') && usuarioForm.get('email')?.touched">
    Formato de email inválido
  </small>

  <p-floatlabel class="w-full">
    <p-password
      id="senha"
      formControlName="senha"
      class="w-full"
      [toggleMask]="true"
      [feedback]="true"></p-password>
    <label for="senha">Senha</label>
  </p-floatlabel>
  <small class="p-error" *ngIf="usuarioForm.get('senha')?.hasError('required') && usuarioForm.get('senha')?.touched">
    Senha é obrigatória
  </small>
  <small class="p-error" *ngIf="usuarioForm.get('senha')?.hasError('minlength') && usuarioForm.get('senha')?.touched">
    Senha deve ter pelo menos 6 caracteres
  </small>

  <p-floatlabel class="w-full">
    <p-password
      id="confirmarSenha"
      formControlName="confirmarSenha"
      class="w-full"
      [toggleMask]="true"
      [feedback]="false"></p-password>
    <label for="confirmarSenha">Confirmar Senha</label>
  </p-floatlabel>
  <small class="p-error" *ngIf="usuarioForm.get('confirmarSenha')?.hasError('required') && usuarioForm.get('confirmarSenha')?.touched">
    Confirmação de senha é obrigatória
  </small>
  <small class="p-error" *ngIf="usuarioForm.hasError('senhasDiferentes') && usuarioForm.get('confirmarSenha')?.touched">
    As senhas não coincidem
  </small>

  <div class="flex justify-content-end gap-2 pt-2">
    <p-button label="Cancelar" variant="outlined" [disabled]="loading" (onClick)="fechar()"></p-button>
    <p-button label="Criar Usuário" [disabled]="usuarioForm.invalid || loading" [loading]="loading" (onClick)="onSubmit()"></p-button>
  </div>
</form>
