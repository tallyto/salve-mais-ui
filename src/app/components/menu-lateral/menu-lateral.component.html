<!-- Toolbar para usuários autenticados -->
<ng-container *ngIf="isAuthenticated">
  <mat-toolbar color="primary" class="app-toolbar">
    <button (click)="toggleSidenav()" mat-icon-button matTooltip="Menu" class="toolbar-icon-button">
      <mat-icon>menu</mat-icon>
    </button>
    <div class="toolbar-brand">
      <span class="app-title">{{ appTitle }}</span>
    </div>
    <span class="toolbar-item-spacer"></span>

    <div class="toolbar-actions">
      <button mat-icon-button matTooltip="Notificações" routerLink="/notificacoes" class="toolbar-icon-button">
        <mat-icon [matBadge]="getNotificationBadgeText()"
                  [matBadgeHidden]="!shouldShowNotificationBadge()"
                  matBadgeColor="warn"
                  matBadgeSize="small">notifications</mat-icon>
      </button>

      <button [matMenuTriggerFor]="userAccountMenu" mat-button class="user-profile-button">
        <div class="user-profile">
          <span class="user-avatar">{{ getUserInitials() }}</span>
          <span class="username">{{ username }}</span>
          <mat-icon class="profile-chevron">expand_more</mat-icon>
        </div>
      </button>

      <mat-menu #userAccountMenu [overlapTrigger]="false" yPosition="below" class="user-menu">
        <div class="user-menu-header">
          <span class="user-avatar menu-avatar">{{ getUserInitials() }}</span>
          <div class="user-info">
            <p class="user-name">{{ username }}</p>
            <p class="user-email">{{ userEmail }}</p>
          </div>
        </div>
        <mat-divider></mat-divider>
        <button mat-menu-item routerLink="/minha-conta">
          <mat-icon>person</mat-icon>
          <span>Minha Conta</span>
        </button>
        <button mat-menu-item routerLink="#">
          <mat-icon>settings</mat-icon>
          <span>Configurações</span>
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="logout()">
          <mat-icon>exit_to_app</mat-icon>
          <span>Sair</span>
        </button>
      </mat-menu>
    </div>
  </mat-toolbar>
</ng-container>

<!-- Toolbar simples para usuários não autenticados (sem barra de navegação) -->
<ng-container *ngIf="!isAuthenticated">
  <mat-toolbar color="primary" class="app-toolbar">
    <span class="app-title">Salve Mais</span>
    <span class="toolbar-item-spacer"></span>
  </mat-toolbar>
</ng-container>

<!-- Container principal -->
<mat-sidenav-container class="app-container">
  <!-- Menu lateral (apenas para usuários autenticados) -->
  <mat-sidenav #sidenav *ngIf="isAuthenticated" class="app-sidenav" [mode]="isLargeScreen ? 'side' : 'over'">
    <div class="sidenav-header">
      <div class="brand-lockup">
        <img src="assets/images/logo.svg" alt="Salve Mais" class="brand-logo">
        <div class="brand-text">
          <strong>Salve Mais</strong>
          <span>{{ appTitle }}</span>
        </div>
      </div>
    </div>

    <div class="sidenav-content">
      <mat-nav-list class="primary-nav">
        <!-- Principal -->
        <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }" class="nav-link dashboard-link">
          <mat-icon class="nav-icon">dashboard</mat-icon>
          <span class="nav-label">Dashboard</span>
        </a>

        <!-- Seções colapsáveis -->
        <div *ngFor="let section of menuSections" class="nav-section">
          <button type="button"
                  class="nav-section-toggle"
                  [class.section-active]="isSectionActive(section)"
                  (click)="toggleSection(section.id)"
                  [attr.aria-expanded]="isSectionExpanded(section.id)">
            <mat-icon class="section-icon">{{ section.icon }}</mat-icon>
            <span class="section-title">{{ section.title }}</span>
            <mat-icon class="section-chevron" [class.expanded]="isSectionExpanded(section.id)">expand_more</mat-icon>
          </button>

          <div class="nav-section-items" [class.collapsed]="!isSectionExpanded(section.id)">
            <a *ngFor="let item of section.items" mat-list-item [routerLink]="item.route" routerLinkActive="active-link" class="nav-link">
              <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
              <span class="nav-label">{{ item.label }}</span>
            </a>
          </div>
        </div>
      </mat-nav-list>
    </div>

    <div class="sidenav-footer">
      <div class="footer-user">
        <span class="user-avatar">{{ getUserInitials() }}</span>
        <div class="footer-user-info">
          <strong>{{ username }}</strong>
          <span>{{ userEmail }}</span>
        </div>
      </div>
      <div class="app-version">v{{ appVersion }}</div>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <div class="container">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
