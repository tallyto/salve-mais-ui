<div class="flex flex-column gap-3">
  <div class="grid" *ngIf="accounts.length > 0">
    <div class="col-12 md:col-6">
      <div class="salve-surface-card">
        <div class="flex justify-content-between align-items-start">
          <div>
            <div class="text-sm text-color-secondary">Saldo total</div>
            <div class="text-2xl font-bold">{{ getSaldoTotal() | currency:'BRL':'symbol':'1.2-2' }}</div>
          </div>
          <i class="pi pi-wallet text-2xl text-color-secondary"></i>
        </div>
      </div>
    </div>

    <div class="col-12 md:col-6">
      <div class="salve-surface-card">
        <div class="flex justify-content-between align-items-start">
          <div>
            <div class="text-sm text-color-secondary">Contas cadastradas</div>
            <div class="text-2xl font-bold">{{ accounts.length }}</div>
          </div>
          <i class="pi pi-building text-2xl text-color-secondary"></i>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="isLoadingResults" class="grid">
    <div class="col-12 md:col-6" *ngFor="let i of [1,2]">
      <div class="salve-surface-card">
        <div class="flex justify-content-between align-items-start">
          <div class="flex flex-column gap-2">
            <p-skeleton width="7rem" height=".875rem"></p-skeleton>
            <p-skeleton width="8rem" height="1.75rem"></p-skeleton>
          </div>
          <p-skeleton shape="circle" size="2rem"></p-skeleton>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="isLoadingResults" class="grid">
    <div class="col-12 md:col-6" *ngFor="let i of [1,2]">
      <div class="salve-surface-card">
        <div class="flex justify-content-between align-items-start gap-3">
          <div class="flex flex-column gap-2 flex-grow-1">
            <p-skeleton width="8rem" height="1rem"></p-skeleton>
            <p-skeleton width="5rem" height="0.875rem"></p-skeleton>
          </div>
          <p-skeleton shape="circle" size="2rem"></p-skeleton>
        </div>
        <div class="border-top-1 surface-border my-3"></div>
        <p-skeleton width="7rem" height="1.5rem" borderRadius="1rem"></p-skeleton>
        <div class="flex justify-content-end gap-2 mt-3">
          <p-skeleton shape="circle" size="2rem"></p-skeleton>
          <p-skeleton shape="circle" size="2rem"></p-skeleton>
          <p-skeleton shape="circle" size="2rem"></p-skeleton>
        </div>
      </div>
    </div>
  </div>

  <div class="grid" *ngIf="!isLoadingResults && accounts.length > 0">
    <div class="col-12 md:col-6" *ngFor="let account of accounts">
      <div class="salve-surface-card">
        <div class="flex justify-content-between align-items-start gap-3">
          <div class="flex-grow-1">
            <ng-container *ngIf="!isEditing(account)">
              <h4 class="m-0 mb-1">{{ account.titular }}</h4>
              <span class="text-sm text-color-secondary">{{ getTipoDescricao(account.tipo) }}</span>
            </ng-container>
            <ng-container *ngIf="isEditing(account)">
              <p-floatlabel class="w-full">
                <input pInputText id="titular-edit" [(ngModel)]="tempTitular" (keyup.enter)="saveEdit()" (keyup.escape)="cancelEdit()" class="w-full" autofocus>
                <label for="titular-edit">Nome do titular</label>
              </p-floatlabel>
            </ng-container>
          </div>
          <i [class]="'pi ' + mapPrimeIcon(getTipoIcon(account.tipo)) + ' text-2xl text-color-secondary'"></i>
        </div>

        <div class="border-top-1 surface-border my-3"></div>

        <div class="mb-3">
          <span class="salve-amount-pill">{{ account.saldo | currency:'BRL':'symbol':'1.2-2' }}</span>
        </div>

        <div class="flex gap-2 justify-content-end">
          <ng-container *ngIf="!isEditing(account)">
            <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" (onClick)="startEdit(account)" pTooltip="Editar nome" tooltipPosition="top"></p-button>
            <p-button icon="pi pi-arrow-right-arrow-left" [rounded]="true" [text]="true" (onClick)="abrirTransferencia(account)" pTooltip="Transferir saldo" tooltipPosition="top"></p-button>
            <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" (onClick)="excluirConta(account)" pTooltip="Excluir conta" tooltipPosition="top"></p-button>
          </ng-container>

          <ng-container *ngIf="isEditing(account)">
            <p-button icon="pi pi-check" [rounded]="true" [text]="true" severity="success" (onClick)="saveEdit()" pTooltip="Salvar" tooltipPosition="top"></p-button>
            <p-button icon="pi pi-times" [rounded]="true" [text]="true" severity="secondary" (onClick)="cancelEdit()" pTooltip="Cancelar" tooltipPosition="top"></p-button>
          </ng-container>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="!isLoadingResults && accounts.length === 0" class="flex flex-column align-items-center gap-2 text-center p-5">
    <i class="pi pi-building text-4xl text-color-secondary"></i>
    <h3 class="m-0">Nenhuma conta cadastrada</h3>
    <p class="text-color-secondary m-0">Adicione uma conta bancária usando o formulário.</p>
  </div>
</div>
