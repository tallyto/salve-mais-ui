<div class="flex align-items-center justify-content-center" style="min-height: 100vh;">
  <p-card class="text-center" [ngStyle]="{'max-width': '420px'}">
    <div class="flex justify-content-center mb-4">
      <i class="pi pi-check-circle text-green-600" style="font-size: 64px;"></i>
    </div>
    <h2 class="text-2xl font-bold mb-2">Assinatura confirmada!</h2>
    <p class="text-color-secondary mb-6">
      Seu plano foi ativado com sucesso. Você já pode usar todos os recursos disponíveis no seu plano.
    </p>
    <p-button label="Ir para o Dashboard" icon="pi pi-home" (onClick)="irParaDashboard()" class="w-full"></p-button>
  </p-card>
</div>
