<div class="billing-result-container">
  <div class="billing-result-card">
    <mat-icon class="result-icon icon-success">check_circle</mat-icon>
    <h2 class="result-title">Assinatura confirmada!</h2>
    <p class="result-message">
      Seu plano foi ativado com sucesso. Você já pode usar todos os recursos disponíveis no seu plano.
    </p>
    <button mat-raised-button color="primary" (click)="irParaDashboard()">
      <mat-icon>home</mat-icon>
      Ir para o Dashboard
    </button>
  </div>
</div>
