<div class="billing-result-container">
  <div class="billing-result-card">
    <mat-icon class="result-icon icon-warn">cancel</mat-icon>
    <h2 class="result-title">Assinatura não concluída</h2>
    <p class="result-message">
      O processo de assinatura foi cancelado. Você pode tentar novamente a qualquer momento.
    </p>
    <button mat-raised-button color="primary" (click)="tentarNovamente()">
      <mat-icon>refresh</mat-icon>
      Tentar novamente
    </button>
  </div>
</div>
