<div class="flex align-items-center justify-content-center" style="min-height: 100vh;">
  <p-card class="text-center" [ngStyle]="{'max-width': '420px'}">
    <div class="flex justify-content-center mb-4">
      <i class="pi pi-times-circle text-orange-600" style="font-size: 64px;"></i>
    </div>
    <h2 class="text-2xl font-bold mb-2">Assinatura não concluída</h2>
    <p class="text-color-secondary mb-6">
      O processo de assinatura foi cancelado. Você pode tentar novamente a qualquer momento.
    </p>
    <p-button label="Tentar novamente" icon="pi pi-refresh" (onClick)="tentarNovamente()" styleClass="w-full"></p-button>
  </p-card>
</div>
